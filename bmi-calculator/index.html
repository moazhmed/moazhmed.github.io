<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة BMI والنظام الغذائي</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🏥 حاسبة BMI والنظام الغذائي</h1>
        
        <!-- BMI Section -->
        <div class="section">
            <h2>📊 احسب BMI الخاص بك</h2>
            <div class="input-group">
                <div class="input-field">
                    <label for="height">الطول (سم):</label>
                    <input type="number" id="height" placeholder="مثال: 170" min="1">
                </div>
                <div class="input-field">
                    <label for="weight">الوزن (كغ):</label>
                    <input type="number" id="weight" placeholder="مثال: 70" min="1">
                </div>
                <div class="input-field">
                    <label for="age">العمر (سنة):</label>
                    <input type="number" id="age" placeholder="مثال: 30" min="1">
                </div>
            </div>
            <button class="btn-primary" onclick="calculateBMI()">احسب BMI</button>
            
            <div id="bmiResult" class="result hidden">
                <div class="bmi-display">
                    <div class="bmi-value-box">
                        <p class="label">BMI الخاص بك</p>
                        <p id="bmiValue" class="value">0.0</p>
                    </div>
                    <p id="bmiCategory" class="category">الحالة: -</p>
                </div>
            </div>
        </div>
        
        <!-- Diet Section -->
        <div class="section">
            <h2>🍽️ اختر الحالة الصحية للحصول على معلومات النظام الغذائي</h2>
            <div class="input-field">
                <label for="diseaseSelect">اختر الحالة الصحية:</label>
                <select id="diseaseSelect" onchange="calculateDiet()">
                    <option value="">-- اختر الحالة --</option>
                    <option value="obesity">السمنة (زيادة الوزن)</option>
                    <option value="underweight">النحافة (نقص الوزن)</option>
                    <option value="diabetes">السكري</option>
                    <option value="hypertension">ارتفاع ضغط الدم</option>
                    <option value="pregnancy">الحمل</option>
                    <option value="ulcer">قرحة المعدة</option>
                    <option value="kidney">الفشل الكلوي</option>
                    <option value="cancer">السرطان</option>
                </select>
            </div>
            
            <div id="dietResult" class="result hidden">
                <h3 id="conditionName">النظام الغذائي</h3>
                
                <div class="diet-info-box">
                    <div class="info-item">
                        <span class="info-label">السعرات الحرارية اليومية:</span>
                        <span id="caloriesInfo" class="info-value">-</span>
                    </div>
                </div>
                
                <div class="macros-container">
                    <h4>نسب العناصر الغذائية:</h4>
                    <div class="macro-box">
                        <div class="macro-item">
                            <span class="macro-label">الكربوهيدرات</span>
                            <span id="carbs" class="macro-value">-</span>
                        </div>
                        <div class="macro-item">
                            <span class="macro-label">البروتين</span>
                            <span id="protein" class="macro-value">-</span>
                        </div>
                        <div class="macro-item">
                            <span class="macro-label">الدهون</span>
                            <span id="fat" class="macro-value">-</span>
                        </div>
                    </div>
                </div>
                
                <div class="components-box">
                    <h4>نصائح وتوصيات النظام الغذائي:</h4>
                    <ul id="dietComponents" class="components-list">
                        <li>جاري التحميل...</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
